# environment.yml — Conda environment for wien2k_gen with optional ML support
# Usage:  conda env create -f environment.yml
# Or:     mamba env create -f environment.yml   (faster)
# Minimal: conda create -n wien2k_gen python=3.11 pip && pip install wien2k_gen

name: wien2k_gen
channels:
  - conda-forge
  - defaults

dependencies:
  - python>=3.9
  - pip
  - numpy>=1.24
  - pyyaml>=6.0
  - psutil>=5.9
  - filelock>=3.12
  - packaging>=23.0
  # Optional: TUI (rich, textual)
  - rich>=13.0
  - textual>=0.40
  # Offline install from PyPI when conda package lags
  - pip:
    - wien2k_gen>=0.1.0

# For Bayesian optimization (optional, large install ~2GB):
#   conda install pytorch cpuonly -c pytorch
#   pip install botorch gpytorch
#
# The built-in pure-NumPy Bayesian optimizer in wien2k_gen works without these.
