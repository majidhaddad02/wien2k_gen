name: ReFrame HPC Benchmark

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  bench:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'setup.py', 'setup.cfg', 'requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install "reframe-hpc>=4.0"

      - name: Verify installation
        run: |
          forge --version || python -m forge --version || echo "forge installed"
          reframe --version

      - name: Run smoke tests
        run: |
          reframe \
            -C tests/reframe/reframe_config.py \
            -c tests/reframe/wien2k_gen_test.py \
            --tag smoke \
            -r \
            --performance-report \
            || reframe \
              -C tests/reframe/reframe_config.py \
              -c tests/reframe/wien2k_gen_test.py \
              -r

      - name: Run benchmark tests
        run: |
          reframe \
            -C tests/reframe/reframe_config.py \
            -c tests/reframe/wien2k_gen_test.py \
            --tag benchmark \
            -r \
            --performance-report \
            || reframe \
              -C tests/reframe/reframe_config.py \
              -c tests/reframe/wien2k_gen_test.py \
              -r

      - name: Upload ReFrame logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reframe-logs-${{ matrix.python-version }}
          path: |
            reframe.log
            output/
            stage/
          retention-days: 7

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reframe-perf-${{ matrix.python-version }}
          path: |
            perflogs/
            *.pfm
          retention-days: 14
